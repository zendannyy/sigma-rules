title: Linux Execution From Hidden Dot Path Under Writable Temp Trees
id: 1b2c3d4e-5f60-4789-a012-cdef01234567
status: experimental
description: |
  Detects execution where the binary path includes a dot-prefixed path segment under /tmp or /var/tmp,
  a common hide-artifacts technique on Linux (Defense Evasion).
author: zendannyy
date: 2026-04-24
tags:
  - attack.defense-evasion
  - attack.t1564.001
logsource:
  product: linux
  category: process_creation
detection:
  selection_writable_root:
    Image|contains:
      - '/tmp/'
      - '/var/tmp/'
  selection_hidden_segment:
    Image|contains:
      - '/tmp/.'
      - '/var/tmp/.'
  condition: selection_writable_root and selection_hidden_segment
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - Legitimate tools installed under hidden directories by developers
level: low
