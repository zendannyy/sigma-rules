title: Windows Credential Dump via comsvcs MiniDump
id: b7e4a1c2-1002-4a5f-9c3d-aaaaaaaa0002
status: experimental
description: |
  Detects abuse of comsvcs.dll MiniDump export to dump LSASS or other process memory
  for credential access.
author: zendannyy
date: 2026-06-06
references:
  - https://attack.mitre.org/techniques/T1003/001/
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  product: windows
  category: process_creation
detection:
  selection_rundll:
    Image|endswith: '\rundll32.exe'
    CommandLine|contains|all:
      - 'comsvcs.dll'
      - 'MiniDump'
  selection_powershell:
    CommandLine|contains|all:
      - 'comsvcs.dll'
      - 'MiniDump'
  condition: 1 of selection_*
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
falsepositives:
  - Rare legitimate crash dump collection by administrators
level: high
