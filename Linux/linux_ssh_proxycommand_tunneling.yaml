title: Linux SSH ProxyCommand or Dynamic Port Forwarding Abuse
id: b7e4a1c2-2002-4a5f-9c3d-bbbbbbbb0002
status: experimental
description: |
  Detects SSH client usage with ProxyCommand, LocalForward, or DynamicForward flags
  associated with tunneling and lateral movement.
author: zendannyy
date: 2026-06-06
references:
  - https://attack.mitre.org/techniques/T1021/004/
  - https://attack.mitre.org/techniques/T1572/
tags:
  - attack.lateral_movement
  - attack.t1021.004
  - attack.command_and_control
  - attack.t1572
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    Image|endswith: '/ssh'
    CommandLine|contains:
      - 'ProxyCommand'
      - '-D '
      - '-L '
      - '-R '
      - 'LocalForward'
      - 'DynamicForward'
  condition: selection
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
falsepositives:
  - DevOps bastion hopping and legitimate jump host workflows
level: low
