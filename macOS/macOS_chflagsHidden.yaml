title: macOS Hidden User - chflags Hidden Applied to User Home Directory
id: 76aa8488-6e6c-4f18-8a50-b4e826827caf
status: experimental
description: |
  Detects hiding a user home folder with chflags, complementing account-level hiding
  documented in T1564.002.
author: zendannyy
date: 2026-06-06
references:
  - https://attack.mitre.org/techniques/T1564/002/
tags:
  - attack.defense_evasion
  - attack.t1564.002
logsource:
  product: macos
  category: process_creation
detection:
  selection:
    Image|endswith: '/chflags'
    CommandLine|contains|all:
      - 'hidden'
      - '/Users/'
  condition: selection
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - User or admin manually hiding personal folders in Finder
level: low
