title: Linux Impair Shell History Logging via Environment
id: d40e50f6-a7b8-490a-cdef-012345678901
status: experimental
description: |
  Detects launching shells with history disabled via environment variables (separate from deleting history files),
  consistent with impairing command history logging (Defense Evasion).
author: zendannyy
date: 2026-04-24
tags:
  - attack.defense-evasion
  - attack.t1562.003
logsource:
  product: linux
  category: process_creation
detection:
  selection_shell:
    Image|endswith:
      - '/bash'
      - '/sh'
      - '/zsh'
  selection_hist_disable:
    CommandLine|contains:
      - 'HISTFILE=/dev/null'
      - 'HISTFILESIZE=0'
      - 'HISTSIZE=0'
      - 'set +o history'
  condition: selection_shell and selection_hist_disable
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - Automation frameworks that disable history in non-interactive contexts
level: low
