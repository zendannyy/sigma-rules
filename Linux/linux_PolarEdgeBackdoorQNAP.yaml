title: PolarEdge Backdoor QNAP Deployment Activity
id: d4e5f6a7-b8c9-4012-d345-6789abcdef01
status: experimental
description: |
  Detects filesystem and command patterns from PolarEdge backdoor deployment on QNAP/Cisco
  edge devices: renaming wget/curl, staging /tmp/.qnax.sh, filter file /tmp/GLyzaagK, and
  CMS-WS CGI relocation observed during CVE-2023-20118 exploitation.
  tags:
  - attack.initial-access
  - attack.t1190
  - attack.persistence
  - attack.t1505.003
  - attack.command-and-control
  - attack.t1071.001
author: zendannyy
date: 2026-06-02
references:
  - https://blog.sekoia.io/polaredge-backdoor-qnap-cve-2023-20118-analysis/
logsource:
  product: linux
  category: process_creation
detection:
  selection_artifacts:
    CommandLine|contains:
      - '/tmp/.qnax.sh'
      - '/tmp/GLyzaagK'
      - 'q_play22.cgi'
      - 'library22.cgi'
  selection_tool_hijack:
    CommandLine|contains:
      - 'curl_c'
      - 'wget_w'
      - '/usr/bin/wget_w'
      - '/sbin/curl_c'
  selection_fingerprint:
    CommandLine|contains:
      - 'BRAND=qnap'
      - 'cmd=putdata'
      - 'MODULE=QNAP'
  condition: selection_artifacts or selection_tool_hijack or selection_fingerprint
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - QNAP administrative scripts that reference similar paths during legitimate upgrades
level: high
