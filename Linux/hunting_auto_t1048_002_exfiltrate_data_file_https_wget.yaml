title: Hunt - Linux Exfiltrate data in a file over HTTPS using wget (T1048.002)
id: 14218b82-aaf5-c7d2-556c-01df37835074
status: experimental
description: |
  Hunting rule loosely modeled after Atomic Red Team T1048.002 test "Exfiltrate data in a file over HTTPS using wget". No public in-the-wild intel reference available; correlate before alerting.
author: zendannyy
date: 2026-06-27
references:
  - https://attack.mitre.org/techniques/T1048/002/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1048.002/T1048.002.yaml#L59
tags:
  - attack.execution
  - attack.t1048.002
  - attack.hunting
logsource:
  product: linux
  category: process_creation
detection:
  selection_binary:
    Image|endswith: '/wget'
  selection_cmd:
    CommandLine|contains|all:
      - 'no-check-certificate'
      - '-timeout'
      - '-delete'
  condition: selection_binary and selection_cmd
fields:
  - ParentImage
  - Image
  - CommandLine
  - User
falsepositives:
  - Authorized red team or security assessment activity
  - Tune or disable if overlapping with approved admin tooling
level: medium
