title: Linux Clear or Disable Shell Command History
id: b20c30d4-e5f6-4789-abcd-ef0123456789
status: experimental
description: |
  Detects commands that clear interactive shell history or disable history persistence,
  consistent with Defense Evasion (impairing command history visibility).
reference:
  https://www.acquisizioniforensi.it/seizelog-technical
author: zendannyy
date: 2026-05-01
tags:
  - attack.defense-evasion
  - attack.t1070.003
logsource:
  product: linux
  category: process_creation
detection:
  selection_clear_history:
    CommandLine|contains:
      - 'cat /dev/null > '
      - ': > '
  selection_histfile_disable:
    CommandLine|contains:
      - 'export PYTHON_HISTORY=/dev/null'
      - 'unset HISTFILE'
      - 'HISTFILE=/dev/null'
      - 'HISTSIZE=0'
  selection_python_histfile:
    CommandLine|contains:
      - '.python_history'
  condition: >-
    (selection_clear_history and selection_python_histfile)
    or selection_histfile_disable
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - User privacy scripts and container entrypoints that reset history intentionally
level: low
