title: macOS Hidden User - Hide500Users Enabled in loginwindow Plist
id: 8f1a2b3c-0006-4d5e-9f0a-aaaaaaaaaaaa
status: experimental
description: Detects enabling Hide500Users, which suppresses sub-500 UID accounts from the login screen, and System Preferences.
author: zendannyy
references:
  - https://attack.mitre.org/techniques/T1564/002/
tags:
  - attack.defense_evasion
  - attack.t1564.002
logsource:
  category: file_event
  product: macos
detection:
  selection:
    TargetFilename|endswith: '/Library/Preferences/com.apple.loginwindow.plist'
  keywords:
    - 'Hide500Users'
    - '<true/>'
  condition: selection
falsepositives:
  - Some enterprise hardening baselines on shared/kiosk systems
level: medium