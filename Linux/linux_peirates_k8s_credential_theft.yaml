title: Linux Peirates Kubernetes Privilege Escalation Tool
id: c7f8091a-2b3c-4d5e-f678-9abcdef12307
status: experimental
description: |
  Detects Peirates, an offensive Kubernetes penetration tool used to list secrets, steal
  service-account tokens, exec into pods, and escalate privileges inside compromised clusters.
  Observed in real-world cloud-native intrusions where attackers pivot from a single pod to
  cluster-admin access.
author: zendannyy
date: 2026-05-29
references:
  - https://attack.mitre.org/techniques/T1552.007/
  - https://github.com/inguardians/peirates
  - https://unit42.paloaltonetworks.com/kubernetes-privilege-escalation/
tags:
  - attack.credential_access
  - attack.privilege_escalation
  - attack.t1552.007
  - attack.t1611
logsource:
  product: linux
  category: process_creation
detection:
  selection_binary:
    Image|endswith: '/peirates'
  selection_cli:
    CommandLine|contains: 'peirates'
    CommandLine|contains:
      - 'listsecrets'
      - 'getsecrets'
      - 'authtoken'
      - 'serviceaccount'
      - 'kubectl exec'
  condition: 1 of selection_*
fields:
  - ParentImage
  - Image
  - CommandLine
  - User
falsepositives:
  - Authorized Kubernetes penetration tests inside non-production clusters
level: high
