title: Hunt - SystemStartOptions Registry Query for Safe Mode Detection (T1012)
id: 0445f246-60a9-ba00-c097-7e1d0995a418
status: test
description: |
  Detects reads of HKLM\SYSTEM\CurrentControlSet\Control\SystemStartOptions — the value
  that stores boot parameters (e.g. NOEXECUTE=OPTIN vs SAFEBOOT:MINIMAL). Ransomware
  including Snatch and Qilin query this key to determine whether the host is already in
  Safe Mode before forcing a reboot and encrypting with AV/EDR unloaded.
  Treat as a high-interest hunting lead when paired within minutes with Safe Mode staging:
  bcdedit /set safeboot, reg add under SafeBoot\Minimal or SafeBoot\Network, or
  shutdown /r.
author: zendannyy
date: 2026-06-13
references:
  - https://attack.mitre.org/techniques/T1012/
  - https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-263a
  - https://vipre.com/blog/the-art-of-snatching-snatch-ransomware/
  - https://attack.mitre.org/software/S1242/
tags:
  - attack.discovery
  - attack.t1012
  - attack.t1562.009
  - attack.hunting
logsource:
  product: windows
  category: process_creation
detection:
  selection_reg:
    Image|endswith: '\\reg.exe'
    CommandLine|contains|all:
      - 'query'
      - 'SystemStartOptions'
      - 'CurrentControlSet\Control'
  selection_ps:
    Image|endswith:
      - '\\powershell.exe'
      - '\\pwsh.exe'
    CommandLine|contains|all:
      - 'SystemStartOptions'
      - 'CurrentControlSet'
      - 'Control'
  filter_modify:
    CommandLine|contains:
      - ' add '
      - ' export '
      - ' save '
      - 'Set-ItemProperty'
      - 'Remove-ItemProperty'
      - 'New-ItemProperty'
  condition: 1 of selection_* and not filter_modify
fields:
  - ParentImage
  - Image
  - CommandLine
  - User
falsepositives:
  - Boot configuration troubleshooting by administrators or support engineers
  - Forensic and incident-response tooling inspecting boot parameters
level: low
