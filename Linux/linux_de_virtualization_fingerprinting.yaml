title: Linux Virtualization Fingerprinting Commands
id: 2c3d4e5f-6071-489a-b123-def012345678
status: experimental
description: |
  Detects common VM/sandbox discovery commands and known scripts,
  consistent with virtualization/sandbox evasion (Defense Evasion).
references:
  - https://people.redhat.com/rjones/virt-what/
author: zendannyy
date: 2026-04-27
logsource:
  product: linux
  category: process_creation
tags:
  - attack.defense-evasion
  - attack.t1497.001
detection:
  selection_tools:
    Image|endswith:
      - '/systemd-detect-virt'
      - '/virt-what'
      - '/dmidecode'
  condition: selection_tools
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - Cloud inventory agents and approved capacity planning tooling
level: medium
