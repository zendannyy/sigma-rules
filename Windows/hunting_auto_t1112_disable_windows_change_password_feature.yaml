title: Hunt - Windows Disable Windows Change Password Feature (T1112)
id: 02eb738d-4958-ab61-0a89-ce4b53372dea
status: experimental
description: |
  Hunting rule loosely modeled after Atomic Red Team T1112 test "Disable Windows Change Password Feature". No public in-the-wild intel reference available; correlate before alerting.
author: zendannyy
date: 2026-06-27
references:
  - https://attack.mitre.org/techniques/T1112/
  - https://github.com/redcanaryco/atomic-red-team/tree/master/atomics/T1112
tags:
  - attack.execution
  - attack.t1112
  - attack.hunting
logsource:
  product: windows
  category: process_creation
detection:
  selection_binary:
    Image|endswith: '\\reg.exe'
  selection_cmd:
    CommandLine|contains|all:
      - 'HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\Policies\System'
      - 'DisableChangePassword'
  condition: selection_binary and selection_cmd
fields:
  - ParentImage
  - Image
  - CommandLine
  - User
falsepositives:
  - Authorized red team or security assessment activity
  - Tune or disable if overlapping with approved admin tooling
level: informational
