title: macOS Hide Artifacts Hidden User via dscl
id: 4238a7f0-a980-4fff-98a2-dfc0a363d507
status: experimental
description: |
  Detects creation of hidden local user accounts on macOS via dscl, matching Atomic Red Team
  T1564.002 tests:
    - Create Hidden User using UniqueID < 500 (e.g. dscl -create /Users/<user> UniqueID 333)
    - Create Hidden User using IsHidden option (e.g. dscl -create /Users/<user> IsHidden 1)
author: zendannyy
date: 2026-06-06
references:
  - https://attack.mitre.org/techniques/T1564/002/
  - https://github.com/redcanaryco/atomic-red-team/tree/master/atomics/T1564.002
tags:
  - attack.defense_evasion
  - attack.t1564.002
logsource:
  product: macos
  category: process_creation
detection:
  selection_uniqueid:
    Image|endswith: '/dscl'
    CommandLine|contains|all:
      - '-create'
      - '/Users/'
      - 'UniqueID'
  selection_ishidden:
    Image|endswith: '/dscl'
    CommandLine|contains|all:
      - '-create'
      - '/Users/'
      - 'IsHidden'
  filter_known_system_uid:
    CommandLine|contains:
      - 'UniqueID 0'
      - 'UniqueID 1'
      - 'UniqueID 202'
      - 'UniqueID 205'
      - 'UniqueID 248'
  condition: 1 of selection_* and not filter_known_system_uid
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
falsepositives:
  - Legitimate MDM or provisioning scripts creating service accounts
  - Rare enterprise service account creation with low UID
level: high
