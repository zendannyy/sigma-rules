title: Linux OpenSSL Decode Piped to Interpreter
id: a4b5c6d7-e8f9-497a-d901-567890123456
status: experimental
description: |
  Detects openssl enc/base64 decode patterns piped to shells or interpreters, an obfuscation and decode-execute chain.
author: zendannyy
date: 2026-04-27
tags:
  - attack.defense-evasion
  - attack.t1027.010
logsource:
  product: linux
  category: process_creation
detection:
  selection_shell_parent:
    Image|endswith:
      - '/bash'
      - '/sh'
      - '/zsh'
  selection_openssl:
    CommandLine|contains: 'openssl'
  selection_decode:
    CommandLine|contains:
      - ' enc -d'
      - ' base64 -d'
  selection_pipe_shell:
    CommandLine|contains:
      - '| bash'
      - '| sh'
      - '| python'
      - '| perl'
  condition: selection_shell_parent and selection_openssl and selection_decode and selection_pipe_shell
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - Rare operational scripts that decode secrets locally
level: medium
