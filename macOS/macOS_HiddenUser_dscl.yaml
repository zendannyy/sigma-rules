title: macOS Hidden User - dscl Assigns UID Below 500
id: 8f1a2b3c-0003-4d5e-9f0a-aaaaaaaaaaaa
status: experimental
description: Detects assignment of UniqueID under 500, which hides users from login when Hide500Users is true.
references:
  - https://attack.mitre.org/techniques/T1564/002/
tags:
  - attack.defense-evasion
  - attack.t1564.002
logsource:
  category: process_creation
  product: macos
detection:
  selection:
    Image|endswith: '/dscl'
    CommandLine|contains|all: 
      - 'IsHidden 1'
      - 'UniqueID'
      - '/Users/'
  filter_known_system:
    CommandLine|contains:
      - 'UniqueID 0'
      - 'UniqueID 1'
      - 'UniqueID 202'
      - 'UniqueID 205'
      - 'UniqueID 248'
  condition: selection and not filter_known_system
falsepositives:
  - Rare legitimate service account provisioning with low UID
level: high
