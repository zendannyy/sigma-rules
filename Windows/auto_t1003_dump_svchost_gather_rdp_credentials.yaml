title: Windows Dump svchost to gather RDP credentials (T1003)
id: d089c96d-c15a-6f25-6b48-a2e79ec24e9f
status: test
description: |
  Detects Atomic Red Team T1003 test "Dump svchost.exe to gather RDP credentials" (OS Credential Dumping) using command-line and process indicators derived from executor behavior.
author: zendannyy
date: 2026-06-13
references:
  - https://attack.mitre.org/techniques/T1003/
  - https://lolbas-project.github.io/lolbas/Binaries/Rundll32/
  - https://www.cisa.gov/news-events/cybersecurity-advisories/aa21-131a
  - https://github.com/redcanaryco/atomic-red-team/tree/master/atomics/T1003
tags:
  - attack.credential_access
  - attack.t1003
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\\rundll32.exe'
    CommandLine|contains|all:
      - 'C:\windows\System32\comsvcs.dll,'
      - '$env:TEMP\svchost-exe.dmp'
      - '(Get-NetTCPConnection'
  condition: selection
fields:
  - ParentImage
  - Image
  - CommandLine
  - User
falsepositives:
  - Authorized red team or security assessment activity
level: medium
