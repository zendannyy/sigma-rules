title: AWS STS AssumeRole High-Risk Session Issuance
id: b7e4a1c2-4001-4a5f-9c3d-dddddddd0001
status: experimental
description: |
  Detects high-risk AWS STS role assumption activity beyond simple user-agent allowlisting.

  Fires when a successful AssumeRole-family API call matches one or more risk indicators:
  long-term IAM user credentials, privileged/cross-account role targets, root initiation,
  non-console client fingerprints.

  Additional detective controls to layer in production (not all expressible in one Sigma rule):
    - New-terms / rare principal-to-role pairs (first time user X assumes role Y)
    - Source IP baseline and impossible-travel vs historical CloudTrail for that principal
author: zendannyy
date: 2026-06-08
references:
  - https://attack.mitre.org/techniques/T1078/004/
  - https://attack.mitre.org/techniques/T1550/001/
  - https://docs.aws.amazon.com/IAM/latest/UserGuide/cloudtrail-integration.html
tags:
  - attack.defense-evasion
  - attack.t1078.004
  - attack.lateral-movement
  - attack.t1550.001
logsource:
  product: aws
  service: cloudtrail
detection:
  selection_base:
    eventSource: 'sts.amazonaws.com'
    eventName:
      - 'AssumeRole'
      - 'AssumeRoleWithSAML'
      - 'AssumeRoleWithWebIdentity'
  filter_failure:
    errorCode:
      - 'AccessDenied'
      - 'ExpiredTokenException'
  selection_iam_user:
    userIdentity.type: 'IAMUser'
  selection_privileged_role:
    requestParameters.roleArn|contains:
      - 'OrganizationAccountAccessRole'
      - 'Administrator'
      - 'AdminAccess'
      - 'PowerUser'
      - 'FullAccess'
      - 'SecurityAudit'
      - 'ViewOnlyAccess'
      - '/aws-reserved/sso.amazonaws.com/'
  selection_script_user_agent:
    userAgent|contains:
      - 'curl/'
      - 'wget/'
      - 'python-requests'
      - 'Go-http-client'
      - 'axios/'
      - 'libwww-perl'
      - 'Java/'
      - 'powershell'
      - 'PostmanRuntime'
  selection_long_session:
    requestParameters.durationSeconds|gte: 14400'
  filter_known_automation:
    userAgent|contains:
      - 'aws-cli'
      - 'aws-sdk'
      - 'boto3'
      - 'Botocore'
      - 'Terraform'
      - 'pulumi'
      - 'Jenkins'
      - 'GitHubActions'
      - 'GitLab'
      - 'Spinnaker'
  filter_aws_service_invocation:
    userIdentity.invokedBy|contains:
      - 'AWS Internal'
      - '.amazonaws.com'
  filter_console:
    sourceIPAddress: 'AWS Internal'
    userAgent|contains: 'console.amazonaws.com'
  condition: >-
    selection_base and not filter_failure
    and 1 of selection_iam_user, selection_privileged_role,
    selection_cross_account_pivot, selection_script_user_agent, selection_long_session,
    selection_suspicious_session_name
    and not 1 of filter_known_automation, filter_aws_service_invocation, filter_console
fields:
  - sourceIPAddress
  - userIdentity.type
  - userIdentity.arn
  - userIdentity.accountId
  - userIdentity.sessionContext.sessionIssuer.arn
  - requestParameters.roleArn
  - requestParameters.roleSessionName
  - requestParameters.durationSeconds
  - userAgent
  - recipientAccountId
falsepositives:
  - IAM users or break-glass roles legitimately assuming privileged roles with MFA enforced elsewhere
  - Long-lived automation using non-standard SDK user-agent strings
  - Cross-account roles used by approved landing-zone or security tooling
level: high
