title: TeamPCP durabletask PyPI Worm Execution (May 2026)
id: 3a4b5c6d-7e8f-4901-a234-567890abcdef
status: test
description: |
  Detects post-install execution of the TeamPCP-compromised Microsoft durabletask package
  (v1.4.1–1.4.3, May 2026). The worm drops rope.pyz/managed.pyz, marks infection via
  ~/.cache/.sys-update-check, persists as pgsql-monitor.service, and then propagates via AWS SSM
  and kubectl exec.
tags:
  - attack.initial-access
  - attack.t1195.002
  - attack.credential-access
  - attack.t1552
  - attack.lateral-movement
  - attack.t1021.007
  - attack.t1550
author: zendanny
date: 2026-06-01
references:
  - https://www.wiz.io/blog/durabletask-teampcp-supply-chain-attack
  - https://isc.sans.edu/diary/33016
  - https://osv.dev/vulnerability/MAL-2026-4174
logsource:
  product: linux
  category: process_creation
detection:
  selection_payload:
    CommandLine|contains:
      - '/tmp/managed.pyz'
      - '/tmp/rope-'
      - 'rope.pyz'
      - 'managed.pyz'
  selection_markers:
    CommandLine|contains:
      - '.sys-update-check'
      - '.sys-update-check-k8s'
      - '.rope_state/ssm_instances.json'
  selection_persistence:
    CommandLine|contains:
      - 'pgsql-monitor.service'
      - 'pgmonitor.py'
  selection_c2:
    CommandLine|contains:
      - 'check.git-service.com'
      - 't.m-kosche.com'
  selection_cloud_propagation:
    CommandLine|contains|all:
      - 'kubectl'
    CommandLine|contains:
      - 'exec'
      - 'aws ssm'
      - 'send-command'
  condition: selection_payload or selection_markers or selection_persistence or selection_c2 or selection_cloud_propagation
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
falsepositives:
  - Internal security research reproducing durabletask IOCs in isolated sandboxes
level: critical
