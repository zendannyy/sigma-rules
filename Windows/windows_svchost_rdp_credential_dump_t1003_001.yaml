title: Windows RDP Credential Harvest via TermService Svchost Dump
id: a8f3c2e1-9b4d-4e6a-8f1c-2d7e5b9a0c3f
status: experimental
description: |
  Detects credential dumping of the TermService svchost process that can retain plaintext
  RDP logon credentials in memory, bypassing LSASS-focused defensive tooling. Attackers
  locate the hosting process with tasklist /M:rdpcorets.dll, Get-NetTCPConnection on port
  3389, or netstat against TermService, then dump memory via comsvcs.dll MiniDump or
  Sysinternals procdump. Correlate recon selections with a subsequent dump in the same
  session when possible.
author: zendannyy
date: 2026-06-13
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://www.n00py.io/2021/05/dumping-plaintext-rdp-credentials-from-svchost-exe/
  - https://lolbas-project.github.io/lolbas/Binaries/Rundll32/
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  product: windows
  category: process_creation
detection:
  selection_rdp_dump_comsvcs:
    Image|endswith: '\\rundll32.exe'
    CommandLine|contains|all:
      - 'comsvcs'
      - 'MiniDump'
    CommandLine|contains:
      - 'svchost'
      - 'TermService'
      - 'Termservice'
      - '3389'
      - 'Get-NetTCPConnection'
      - 'Get-Process svchost'
  selection_rdp_dump_procdump:
    Image|endswith:
      - '\\procdump.exe'
      - '\\procdump64.exe'
    CommandLine|contains|all:
      - '-accepteula'
      - 'svchost'
  selection_rdp_target_recon:
    Image|endswith:
      - '\\cmd.exe'
      - '\\powershell.exe'
      - '\\pwsh.exe'
    CommandLine|contains|all:
      - 'tasklist'
      - 'rdpcorets'
  filter_lsass_target:
    CommandLine|contains: 'lsass'
  condition: 1 of selection_rdp_* and not filter_lsass_target
fields:
  - ParentImage
  - Image
  - CommandLine
  - User
falsepositives:
  - Authorized red-team credential assessments targeting RDP session hosts
  - Rare administrator crash-dump collection of TermService svchost during troubleshooting
level: high
