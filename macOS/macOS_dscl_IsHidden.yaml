title: macOS Hidden User - dscl Sets IsHidden Attribute
id: a1b2c3d4-0002-4e5f-8a9b-111111111102
status: experimental
description: |
  Detects setting IsHidden on a macOS user record to suppress the account from the login screen.
  Maps to Atomic Red Team test "Create Hidden User using IsHidden option" (T1564.002).
author: zendannyy
date: 2026-06-06
references:
  - https://attack.mitre.org/techniques/T1564/002/
  - https://github.com/redcanaryco/atomic-red-team/tree/master/atomics/T1564.002
tags:
  - attack.defense_evasion
  - attack.t1564.002
logsource:
  product: macos
  category: process_creation
detection:
  selection_create:
    Image|endswith: '/dscl'
    CommandLine|contains|all:
      - '-create'
      - '/Users/'
      - 'IsHidden'
  selection_modify:
    Image|endswith: '/dscl'
    CommandLine|contains|all:
      - '/Users/'
      - 'IsHidden'
    CommandLine|contains:
      - '-append'
      - '-merge'
  condition: 1 of selection_*
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - Apple or enterprise tooling managing shared or service accounts
level: high
