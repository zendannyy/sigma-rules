title: Windows Credential Dumping via Pypykatz
id: fdba069e-d2e2-7a6a-e4b5-e249daa0ae83
status: experimental
description: |
  Detects execution of pypykatz with credential-extraction subcommands. Pypykatz is a pure-Python
  Mimikatz implementation used to dump credentials from live LSASS, offline minidumps, or exported
  SAM/SYSTEM/SECURITY registry hives. PoetRAT deployed a compiled build as voStro.exe during
  campaigns targeting energy-sector victims.
author: zendannyy
date: 2026-06-13
references:
  - https://attack.mitre.org/techniques/T1003/002/
  - https://github.com/skelsec/pypykatz/wiki/live---lsa
  - https://www.crowdstrike.com/blog/credential-theft-mimikatz-techniques/
  - https://github.com/redcanaryco/atomic-red-team/tree/master/atomics/T1003.002
tags:
  - attack.credential_access
  - attack.t1003.001
  - attack.t1003.002
logsource:
  product: windows
  category: process_creation
detection:
  selection_entrypoint:
    Image|endswith: '\\pypykatz.exe'
  selection_python:
    Image|endswith:
      - '\\python.exe'
      - '\\python3.exe'
    CommandLine|contains: 'pypykatz'
  selection_dump_live_lsa:
    CommandLine|contains: 'live lsa'
  selection_dump_live_registry:
    CommandLine|contains: 'live registry'
  selection_dump_registry_hive:
    CommandLine|contains|all:
      - 'registry'
    CommandLine|contains:
      - '--sam'
      - '--security'
      - ' -r '
      - '.hive'
      - '.save'
      - 'sam'
      - 'security'
      - 'system'
  selection_dump_minidump:
    CommandLine|contains|all:
      - 'minidump'
      - 'lsa'
  filter_help:
    CommandLine|contains:
      - '--help'
      - ' --version'
      - ' version'
  condition: 1 of selection_entrypoint* and 1 of selection_dump_* and not 1 of filter_*
falsepositives:
  - Authorized penetration testing and red-team credential assessments
  - Security researchers installing or testing pypykatz
level: high
fields:
  - ParentImage
  - Image
  - CommandLine
  - User
