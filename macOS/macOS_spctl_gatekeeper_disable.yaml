title: macOS Gatekeeper or SIP Tampering via spctl or csrutil
id: b7e4a1c2-3002-4a5f-9c3d-cccccccc0002
status: test
description: |
  Detects attempts to disable Gatekeeper assessment or modify System Integrity
  Protection, common defense evasion before unsigned payload execution.
author: zendannyy
date: 2026-06-06
references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://attack.mitre.org/techniques/T1553/001/
tags:
  - attack.defense-evasion
  - attack.t1562.001
  - attack.t1553.001
logsource:
  product: macos
  category: process_creation
detection:
  selection_spctl:
    Image|endswith: '/spctl'
    CommandLine|contains:
      - '--master-disable'
      - 'disable'
  selection_csrutil:
    Image|endswith: '/csrutil'
    CommandLine|contains:
      - 'disable'
  condition: 1 of selection_*
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - Recovery-mode maintenance by authorized administrators
level: high
