title: Post-Phish Click Risky Sign-in
id: 5f0569ac-0ef0-4247-a5e1-aa17e5e84778
status: experimental
description: |
  Correlates an email URL click with a subsequent risky sign-in from the same user within a short time range.
  This pattern is a strong indicator of a successful Adversary-in-the-Middle (AiTM) phishing attack, such as those conducted with the Tycoon2FA kit, where a user is tricked into authenticating through a malicious site, allowing the attacker to capture their session.
author: zendannyy
references:
  - https://www.microsoft.com/en-us/security/blog/2026/03/04/inside-tycoon2fa-how-a-leading-aitm-phishing-kit-operated-at-scale/
date: 2026-03-07
tags:
  - attack.initial_access
  - attack.credential_access
  - attack.t1566.002
  - attack.t1557
logsource:
  product: microsoft
  category: threat_detection
detection:
  selection_click:
    # This detection requires correlation between Microsoft Defender for Office 365 `UrlClickEvents` and Microsoft Entra ID `SigninLogs`.
    # Corresponds to the 'UrlClickEvents' log source from Microsoft Defender, which identifies a user clicking a link in an email that was not blocked outright.
    ActionType: 'ClickAllowed'
  selection_signin:
    # Corresponds to the 'SigninLogs' log source from Microsoft Entra ID.
    # This identifies a sign-in event flagged as risky by Entra ID Protection.
    properties.riskLevelDuringSignIn:
      - 'medium'
      - 'high'
  timeframe: 1h
  # The condition requires the click to be followed by the risky sign-in for the same user.
  # The 'user.name' field should be mapped to the user principal name in both log sources.
  condition: sequence of [selection_click, selection_signin] by user.name
falsepositives:
  - A legitimate user might click a link and then immediately sign in from a new
    device or location (e.g., while traveling), which could trigger a risky
    sign-in alert from Entra ID Protection.
  - Further tuning might involve
    excluding known safe sender domains or URLs.
level: high
