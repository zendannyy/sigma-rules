title: Windows TrickBot-Style Domain Trust Discovery
id: 1aafeb94-9774-2fa1-954f-b0fcf945f8fc
status: experimental
description: |
  Detects nltest domain_trusts combined with net view — TrickBot-style AD/network recon.
author: zendannyy
date: 2026-06-13
references:
  - https://attack.mitre.org/techniques/T1016/
  - https://www.cisa.gov/news-events/cybersecurity-advisories/aa21-131a
  - https://github.com/redcanaryco/atomic-red-team/tree/master/atomics/T1016
tags:
  - attack.discovery
  - attack.t1016
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    CommandLine|contains|all:
      - 'nltest /domain_trusts'
      - 'domain_trusts'
    CommandLine|contains:
      - 'net view'
      - 'net config workstation'
  condition: selection
fields:
  - CommandLine
  - User
  - ParentImage
  - Image
falsepositives:
  - Domain migration and AD health checks
level: high
