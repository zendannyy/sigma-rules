title: Windows Disable NLA for RDP via Command Prompt
id: bbf58785-5018-145d-f73b-47e03eebb35d
status: experimental
description: |
  Detects Atomic Red Team T1021.001 test "Disable NLA for RDP via Command Prompt" (Remote Services: Remote Desktop Protocol) using command-line and process indicators derived from executor behavior.
author: zendannyy
date: 2026-06-15
references:
  - https://attack.mitre.org/techniques/T1021/001/
  - https://www.microsoft.com/en-us/security/blog/2019/08/07/protecting-the-remote-desktop-protocol/
  - https://github.com/redcanaryco/atomic-red-team/tree/master/atomics/T1021
tags:
  - attack.lateral_movement
  - attack.t1021.001
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\\reg.exe'
    CommandLine|contains|all:
      - 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Terminal'
      - 'Server\WinStations\RDP-Tcp'
      - 'UserAuthentication'
  condition: selection
fields:
  - Image
  - CommandLine
  - User
  - ParentImage
falsepositives:
  - Authorized red team or security assessment activity
  - Tune or disable if overlapping with approved admin tooling
level: medium
