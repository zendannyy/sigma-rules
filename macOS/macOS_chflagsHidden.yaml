title: macOS Hidden User - chflags Hidden Applied to User Home Directory
id: 76aa8488-6e6c-4f18-8a50-b4e826827caf
status: experimental
description: Detects hiding a user home folder with chflags, complementing account-level hiding.
references:
  - https://attack.mitre.org/techniques/T1564/002/
tags:
  - attack.defense_evasion
  - attack.t1564.002
logsource:
  category: process_creation
  product: macos
detection:
  selection:
    Image|endswith: '/chflags'
    CommandLine|contains: 'hidden'
    CommandLine|contains: '/Users/'
  condition: selection
falsepositives:
  - User or admin manually hiding personal folders in Finder
level: medium
