title: Windows Multi-Tool Service Discovery Chain
id: ae37edb1-3a50-c0ba-7e9c-4b80275984e7
status: experimental
description: |
  Hunting rule, correlate with additional signals before alerting.
  Detects elevated service enumeration chaining tasklist, sc query, and sc query state=all in one session pattern.
author: zendannyy
date: 2026-06-11
references:
  - https://attack.mitre.org/techniques/T1007/
  - https://github.com/redcanaryco/atomic-red-team/tree/master/atomics/T1007
tags:
  - attack.discovery
  - attack.t1007
  - attack.hunting
logsource:
  product: windows
  category: process_creation
detection:
  selection_tasklist:
    Image|endswith: '\tasklist.exe'
    CommandLine|contains: '/svc'
  selection_sc:
    Image|endswith: '\sc.exe'
    CommandLine|contains:
      - 'query'
      - 'state= all'
  condition: 1 of selection_*
fields:
  - ParentImage
  - Image
  - CommandLine
  - User
falsepositives:
  - Helpdesk troubleshooting actions
level: informational
