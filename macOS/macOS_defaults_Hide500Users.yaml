title: macOS Hidden User - defaults write Hide500Users
id: a1b2c3d4-0007-4e5f-8a9b-111111111107
status: experimental
description: |
  Detects command-line modification of the loginwindow Hide500Users preference,
  enabling concealment of local accounts with UID below 500.
author: zendannyy
date: 2026-06-06
references:
  - https://attack.mitre.org/techniques/T1564/002/
tags:
  - attack.defense_evasion
  - attack.t1564.002
logsource:
  product: macos
  category: process_creation
detection:
  selection:
    Image|endswith: '/defaults'
    CommandLine|contains|all:
      - 'write'
      - 'com.apple.loginwindow'
      - 'Hide500Users'
  condition: selection
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - IT automation configuring shared workstations
level: medium
