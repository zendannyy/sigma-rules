title: Hunt: Windows Disable Windows LogOff Button (T1112)
id: 6b2e775a-c6df-9bdc-4adb-deac0b327ceb
status: experimental
description: |
  Hunting rule loosely modeled after Atomic Red Team T1112 test "Disable Windows LogOff Button". No public in-the-wild intel reference available; correlate before alerting.
author: zendannyy
date: 2026-06-27
references:
  - https://attack.mitre.org/techniques/T1112/
  - https://github.com/redcanaryco/atomic-red-team/tree/master/atomics/T1112
tags:
  - attack.execution
  - attack.t1112
  - attack.hunting
logsource:
  product: windows
  category: process_creation
detection:
  selection_binary:
    Image|endswith: '\\reg.exe'
  selection_cmd:
    CommandLine|contains|all:
      - 'HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer'
      - 'StartMenuLogOff'
      - 'NoLogOff'
  condition: selection_binary and selection_cmd
fields:
  - ParentImage
  - Image
  - CommandLine
  - User
falsepositives:
  - Authorized red team or security assessment activity
  - Tune or disable if overlapping with approved admin tooling
level: low
