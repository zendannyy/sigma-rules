title: macOS Hidden User - dscl Create Local User Account
id: a1b2c3d4-0001-4e5f-8a9b-111111111101
status: experimental
description: |
  Detects creation of a local user via dscl, a common precursor to hidden account persistence.
  Maps to Atomic Red Team T1564.002 hidden user tradecraft.
author: zendannyy
date: 2026-06-06
references:
  - https://attack.mitre.org/techniques/T1564/002/
  - https://github.com/redcanaryco/atomic-red-team/tree/master/atomics/T1564.002
tags:
  - attack.defense_evasion
  - attack.t1564.002
logsource:
  product: macos
  category: process_creation
detection:
  selection:
    Image|endswith: '/dscl'
    CommandLine|contains|all:
      - '-create'
      - '/Users/'
  condition: selection
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - Legitimate MDM or provisioning scripts creating service accounts
level: medium
