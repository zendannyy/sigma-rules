title: Linux Virtualization or Sandbox Fingerprinting Commands
id: 2c3d4e5f-6071-489a-b123-def012345678
status: experimental
description: |
  Detects common VM/sandbox discovery commands used to adapt behavior before executing payloads,
  consistent with virtualization/sandbox evasion (Defense Evasion).
author: zendannyy
date: 2026-04-24
tags:
  - attack.defense-evasion
  - attack.t1497.001
logsource:
  product: linux
  category: process_creation
detection:
  selection_tools:
    Image|endswith:
      - '/systemd-detect-virt'
      - '/virt-what'
      - '/dmidecode'
  condition: selection_tools
fields:
  - Image
  - CommandLine
  - User
falsepositives:
  - Cloud inventory agents and legitimate capacity planning tooling
level: low
