      - '_uucp'
      - '_warmd'
      - '_webauthserver'
      - '_windowserver'
      - '_www'
      - '_wwwproxy'
      - '_xserverdocs'
  condition: selection and not 1 of filter_*
fields:
  - username
  - uid
  - directory
  - shell
falsepositives:
  - Custom service accounts intentionally using low UIDs
level: high
