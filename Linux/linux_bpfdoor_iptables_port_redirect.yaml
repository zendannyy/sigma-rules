title: Linux BPFDoor iptables NAT Redirect
id: c1a2b3c4-d5e6-4789-a012-3456789abc01
status: test
description: |
  Detects BPFDoor-style iptables NAT REDIRECT rules used to tunnel traffic from a
  legitimate service port (e.g. 22/tcp) to a high ephemeral shell port (42391-43390) without
  disrupting the real service for other clients. BPFDoor activates on magic packets, spawns a
  bind shell, inserts short-lived PREROUTING redirects for the controller IP, then deletes them.
author: zendannyy
date: 2026-06-13
references:
  - https://attack.mitre.org/techniques/T1014/
  - https://www.sandflysecurity.com/blog/bpfdoor-an-evasive-linux-backdoor-technical-analysis/
  - https://www.elastic.co/security-labs/a-peek-behind-the-bpfdoor
  - https://www.trendmicro.com/en/research/25/d/bpfdoor-hidden-controller.html
tags:
  - attack.defense_evasion
  - attack.command_and_control
  - attack.t1014
  - attack.t1095
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    Image|endswith:
      - '/iptables'
      - '/xtables-legacy-multi'
      - '/xtables-nft-multi'
    CommandLine|contains|all:
      - 'REDIRECT'
      - '--to-ports'
    CommandLine|contains:
      - 'PREROUTING'
      - 'nat'
  condition: selection
fields:
  - ParentImage
  - Image
  - CommandLine
  - User
falsepositives:
  - Legitimate port-forwarding or load-balancer setup during infrastructure changes
level: high
